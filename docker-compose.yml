services:
  npm-install:
    image: node:lts-bookworm
    environment:
      TZ: Asia/Riyadh
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "cd /home/node/src && npm install"
    volumes:
      - "./src:/home/node/src"


  app:
    build:
      context: .
    depends_on:
      npm-install:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - "./src:/home/node/src"
